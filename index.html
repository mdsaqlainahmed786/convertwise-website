
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Fallback title — react-helmet-async overrides per page -->
    <title>Nimitai — AI Meeting Intelligence for Sales Teams</title>
    <meta name="theme-color" content="#E89422" />

    <!-- Preconnect to critical third-party origins -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <!-- YouTube (video modal — lazy connection is fine, dns-prefetch is enough) -->
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <!-- Fazier badge in footer -->
    <link rel="dns-prefetch" href="https://fazier.com" />

    <!-- Preload the two most critical brand font weights only -->
    <link rel="preload" href="/fonts/axiforma-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/axiforma-regular.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Preload nav logo — LCP element on every page -->
    <link rel="preload" href="/logo-light-nimitai-cropped.webp" as="image" type="image/webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/chrome-logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/chrome-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/chrome-logo.png" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="google5802f6d76e018dd1" />

    <!-- Sitemap discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Additional Meta Tags -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Permissions Policy for YouTube Embed -->
    <meta http-equiv="Permissions-Policy" content="autoplay=*, fullscreen=*, picture-in-picture=*" />

    <!-- Google Analytics 4 — async so it never blocks rendering -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9TP0Q6ZX5D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9TP0Q6ZX5D', {
        page_title: document.title,
        page_location: window.location.href,
      });
    </script>
  </head>

  <body>
    <!-- Inline theme init — runs synchronously to avoid flash of wrong theme.
         Keep it tiny: no external deps, no network requests. -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('nimitai-theme') || 'light';
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme === 'dark' ? 'dark' : 'light');
          root.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- SPA route change tracking for GA4 — deferred to after page load -->
    <script defer>
      (function() {
        var _pushState = history.pushState;
        history.pushState = function() {
          _pushState.apply(this, arguments);
          if (typeof gtag !== 'undefined') {
            gtag('event', 'page_view', {
              page_title: document.title,
              page_location: window.location.href,
            });
          }
        };
      })();
    </script>
  </body>
</html>
